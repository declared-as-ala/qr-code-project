  </g>
  <!-- Wordmark -->
  <g fill="#FFFFFF" font-family="'Geist', 'Inter', -apple-system, system-ui, sans-serif" font-weight="600">
    <text x="100" y="50" font-size="34" letter-spacing="-1.2">click</text>
    <text x="183" y="50" font-size="34" font-weight="800" letter-spacing="-1.2" fill="url(#wgold)">menu</text>
