<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-label="ClickMenu">
  <defs>
    <linearGradient id="wbg" x1="0" y1="0" x2="80" y2="80">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#070707"/>
    </linearGradient>
    <linearGradient id="wgold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE9A8"/>
      <stop offset="55%" stop-color="#E8C158"/>
      <stop offset="100%" stop-color="#B5872E"/>
    </linearGradient>
  </defs>
  <!-- Mark -->
  <g>
    <rect x="0" y="0" width="80" height="80" rx="18" fill="url(#wbg)"/>
    <rect x="0.75" y="0.75" width="78.5" height="78.5" rx="17.25" fill="none" stroke="rgba(255,224,150,0.2)" stroke-width="1"/>
    <path d="M 17.5 61 L 17.5 22.5 L 40 47.5 L 62.5 22.5 L 62.5 61"
