<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" role="img" aria-label="Cheese Steak Resto-Bar-Cafe logo">
  <defs>
    <linearGradient id="csRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E83A2A"/>
      <stop offset="100%" stop-color="#B5121B"/>
    </linearGradient>
    <linearGradient id="csFlame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFE9E5"/>
    </linearGradient>
    <filter id="csShadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Shield -->
  <path filter="url(#csShadow)"
        d="M40 40 H360 V270 C360 360 290 420 200 460 C110 420 40 360 40 270 Z"
        fill="url(#csRed)"/>

  <!-- Flames -->
  <g fill="url(#csFlame)" transform="translate(200 110)">
    <path d="M0 -70 C 14 -50 20 -30 14 -10 C 30 -22 36 -40 30 -60 C 44 -42 50 -20 38 4 C 22 -6 8 -8 0 -10 C -8 -8 -22 -6 -38 4 C -50 -20 -44 -42 -30 -60 C -36 -40 -30 -22 -14 -10 C -20 -30 -14 -50 0 -70 Z"/>
  </g>

  <!-- Main wordmark -->
  <text x="200" y="200" text-anchor="middle"
        font-family="Impact, 'Bebas Neue', Oswald, Arial Black, sans-serif"
        font-size="56" letter-spacing="2" fill="#FFFFFF">CHEESE STEAK</text>

  <!-- Underline ribbon -->
  <rect x="80" y="220" width="240" height="3" fill="#FFFFFF" opacity="0.85"/>

  <!-- Subline -->
  <text x="200" y="252" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="22" fill="#FFFFFF" opacity="0.95">Resto - Bar - Cafe</text>

  <!-- Grill bars -->
  <g stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.9">
    <line x1="110" y1="300" x2="110" y2="370"/>
    <line x1="140" y1="300" x2="140" y2="380"/>
    <line x1="170" y1="300" x2="170" y2="385"/>
    <line x1="200" y1="300" x2="200" y2="388"/>
    <line x1="230" y1="300" x2="230" y2="385"/>
    <line x1="260" y1="300" x2="260" y2="380"/>
    <line x1="290" y1="300" x2="290" y2="370"/>
  </g>
</svg>
